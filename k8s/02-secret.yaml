# ── HOW TO CREATE THIS SECRET ─────────────────────────────────────────────────
# Do NOT commit real values. Create the secret via kubectl or CI:
#
#   kubectl create secret generic unmapped-secrets \
#     --namespace unmapped \
#     --from-literal=GROQ_API_KEY=your_key_here \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or let the GitHub Actions workflow create it from GitHub Secrets.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: unmapped-secrets
  namespace: unmapped
type: Opaque
stringData:
  GROQ_API_KEY: "REPLACE_IN_CI"       # set via GitHub Actions / Azure Key Vault
  OPENAI_API_KEY: ""                   # optional
  GEMINI_API_KEY: ""                   # optional
