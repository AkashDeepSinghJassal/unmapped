services:
  - type: web
    name: unmapped-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/preload_model.py
    startCommand: bash scripts/start.sh
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: sentence_transformers
      - key: ST_MODEL
        value: all-MiniLM-L6-v2
      - key: DUCKDB_PATH
        value: ./data/unmapped.duckdb
      - key: CHROMA_PATH
        value: ./data/chroma
      - key: CONFIG_DIR
        value: ./config
      - key: PYTHON_VERSION
        value: "3.12.0"
