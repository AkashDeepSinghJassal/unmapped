name: Deploy Backend → Azure App Service

on:
  push:
    branches:
      - develop
    paths:
      - "backend/**"
      - "config/**"
      - "scripts/**"
      - "run.py"
      - "requirements.txt"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  deploy:
    name: Build & Deploy to App Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Pre-download the sentence-transformers model so it is baked into the
      # deployment package — avoids a slow first-request download on App Service.
      - name: Pre-load sentence-transformers model
        run: python scripts/preload_model.py

      # Zip only backend source — exclude frontend, git history, caches, and
      # local data files (DuckDB / Chroma live on /home/data on App Service).
      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "frontend/*" \
            --exclude "node_modules/*" \
            --exclude ".next/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "data/*" \
            --exclude "*.duckdb" \
            --exclude ".env*" \
            --exclude "k8s/*" \
            --exclude "Dockerfile*" \
            --exclude "*.zip"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
