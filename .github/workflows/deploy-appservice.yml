name: Deploy Backend → Azure App Service

on:
  push:
    branches:
      - develop
    paths:
      - "backend/**"
      - "config/**"
      - "scripts/**"
      - "run.py"
      - "requirements.txt"
      - ".github/**"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13.13"

jobs:
  deploy:
    name: Build & Deploy to App Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Pre-download the sentence-transformers model so it is baked into the
      # deployment package — avoids a slow first-request download on App Service.
      - name: Pre-load sentence-transformers model
        run: python scripts/preload_model.py

      # Zip only backend source — exclude frontend, git history, caches, and
      # local data files (DuckDB / Chroma live on /home/data on App Service).
      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "frontend/*" \
            --exclude "node_modules/*" \
            --exclude ".next/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "data/*" \
            --exclude "*.duckdb" \
            --exclude ".env*" \
            --exclude "k8s/*" \
            --exclude "Dockerfile*" \
            --exclude "*.zip"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

  # ── Job 2: health check ────────────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      # App Service needs ~30s after deploy to restart uvicorn before it
      # starts accepting requests — wait before hitting /api/health.
      - name: Wait for App Service to restart
        run: sleep 40

      - name: Check /api/health
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health"
          echo "Checking $URL"

          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is healthy" >> $GITHUB_STEP_SUMMARY
              echo "🔗 $URL" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            sleep 20
          done

          echo "❌ Health check failed after 3 attempts (last HTTP $STATUS)" >> $GITHUB_STEP_SUMMARY
          exit 1
