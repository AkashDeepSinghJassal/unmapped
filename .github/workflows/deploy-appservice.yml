name: Deploy Backend → Azure App Service (Container)

on:
  push:
    branches:
      - develop
    paths:
      - "backend/**"
      - "config/**"
      - "scripts/**"
      - "run.py"
      - "requirements.txt"
      - "Dockerfile.backend"
      - ".github/workflows/deploy-appservice.yml"
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/unmapped-api

jobs:
  # ── Job 1: build & push image to Docker Hub ───────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

  # ── Job 2: deploy container to App Service ────────────────────────────────
  deploy:
    name: Deploy to App Service
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy container image to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: docker.io/${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}

  # ── Job 3: health check ───────────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      # Container pull + restart takes longer than zip deploy — wait 90s
      - name: Wait for App Service to pull and start container
        run: sleep 90

      - name: Check /api/health
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health"
          echo "Checking $URL"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$URL")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is healthy" >> $GITHUB_STEP_SUMMARY
              echo "Image: docker.io/${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
              echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            sleep 30
          done

          echo "❌ Health check failed after 5 attempts (last HTTP $STATUS)" >> $GITHUB_STEP_SUMMARY
          exit 1
